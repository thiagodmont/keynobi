name: Release

on:
  push:
    branches: [main]

# Required to create tags and GitHub Releases.
permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Job 1: Detect whether package.json version changed ──────────────────────
  check:
    name: Check version bump
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2   # need HEAD and HEAD~1 to compare versions

      - name: Detect version change
        id: check
        run: |
          CURRENT=$(jq -r '.version' package.json)

          # Guard: on the very first commit there is no HEAD~1.
          if ! git rev-parse HEAD~1 > /dev/null 2>&1; then
            echo "First commit on main — no HEAD~1, skipping release"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "version=$CURRENT"     >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PREVIOUS=$(git show HEAD~1:package.json | jq -r '.version')

          echo "Current version : $CURRENT"
          echo "Previous version: $PREVIOUS"

          if [ "$CURRENT" != "$PREVIOUS" ]; then
            echo "Version bumped: $PREVIOUS → $CURRENT — will release"
            echo "should_release=true"  >> "$GITHUB_OUTPUT"
            echo "version=$CURRENT"     >> "$GITHUB_OUTPUT"
          else
            echo "No version change — skipping release"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "version=$CURRENT"     >> "$GITHUB_OUTPUT"
          fi

  # ── Job 2: Build DMGs in parallel for each architecture ─────────────────────
  build:
    name: Build DMG (${{ matrix.arch }})
    needs: check
    if: needs.check.outputs.should_release == 'true'
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: arm64
          - target: x86_64-apple-darwin
            arch: intel

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.target }}

      - name: Install npm dependencies
        run: npm ci

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build DMG
        env:
          # Unsigned build — consistent with scripts/build-dmg.sh.
          # Users bypass Gatekeeper once on first launch (right-click → Open).
          APPLE_SIGNING_IDENTITY: "-"
          # Sentry DSNs at compile time (optional; still gated by user Settings in-app).
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          # Web bundle source maps → Sentry (same release as import.meta.env.VITE_APP_VERSION / package.json).
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: keynobi
          SENTRY_PROJECT: javascript-solid
        run: |
          npm run tauri build -- --target ${{ matrix.target }} --bundles dmg -f telemetry

      - name: Locate and rename DMG
        id: dmg
        run: |
          VERSION=${{ needs.check.outputs.version }}
          DMG=$(find "src-tauri/target/${{ matrix.target }}/release/bundle/dmg" -name "*.dmg" | head -1)
          if [ -z "$DMG" ]; then
            echo "ERROR: No DMG found after build" >&2
            exit 1
          fi
          DEST="Keynobi_${VERSION}_${{ matrix.arch }}.dmg"
          mv "$DMG" "$DEST"
          echo "path=$DEST" >> "$GITHUB_OUTPUT"
          echo "Built: $DEST"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: dmg-${{ matrix.arch }}
          path: ${{ steps.dmg.outputs.path }}
          retention-days: 1

  # ── Job 3: Create git tag and GitHub Release ────────────────────────────────
  publish:
    name: Publish release
    needs: [check, build]
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download Apple Silicon DMG
        uses: actions/download-artifact@v4
        with:
          name: dmg-arm64

      - name: Download Intel DMG
        uses: actions/download-artifact@v4
        with:
          name: dmg-intel

      - name: Create and push tag
        run: |
          VERSION=${{ needs.check.outputs.version }}
          git tag "v${VERSION}"
          git push origin "v${VERSION}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ needs.check.outputs.version }}
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --generate-notes \
            "Keynobi_${VERSION}_arm64.dmg" \
            "Keynobi_${VERSION}_intel.dmg"
