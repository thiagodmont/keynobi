name: Release

on:
  push:
    branches: [main]

# Required to create tags and GitHub Releases.
permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Job 1: Detect whether package.json version changed ──────────────────────
  check:
    name: Check version bump
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2   # need HEAD and HEAD~1 to compare versions

      - name: Detect version change
        id: check
        run: |
          CURRENT=$(jq -r '.version' package.json)

          # Guard: on the very first commit there is no HEAD~1.
          if ! git rev-parse HEAD~1 > /dev/null 2>&1; then
            echo "First commit on main — no HEAD~1, skipping release"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "version=$CURRENT"     >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PREVIOUS=$(git show HEAD~1:package.json | jq -r '.version')

          echo "Current version : $CURRENT"
          echo "Previous version: $PREVIOUS"

          if [ "$CURRENT" != "$PREVIOUS" ]; then
            echo "Version bumped: $PREVIOUS → $CURRENT — will release"
            echo "should_release=true"  >> "$GITHUB_OUTPUT"
            echo "version=$CURRENT"     >> "$GITHUB_OUTPUT"
          else
            echo "No version change — skipping release"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "version=$CURRENT"     >> "$GITHUB_OUTPUT"
          fi

  # ── Job 2: Build DMGs in parallel for each architecture ─────────────────────
  build:
    name: Build DMG (${{ matrix.arch }})
    needs: check
    if: needs.check.outputs.should_release == 'true'
    runs-on: macos-latest
    environment: keynobi_app
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: arm64
          - target: x86_64-apple-darwin
            arch: intel

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.target }}

      - name: Install npm dependencies
        run: npm ci

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      # Developer ID signing + App Store Connect API notarization (Tauri 2):
      # https://v2.tauri.app/distribute/sign/macos/
      - name: Import Developer ID certificate (CI keychain)
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          # Secrets are injected as normal env vars on the runner; log masking does not empty them.
          # If any check fails: verify repository Actions secrets (exact names), org secret repo access, or environment-scoped secrets + workflow `environment:`.
          missing=
          [ -z "${APPLE_CERTIFICATE:-}" ] && missing="${missing} APPLE_CERTIFICATE"
          [ -z "${APPLE_CERTIFICATE_PASSWORD:-}" ] && missing="${missing} APPLE_CERTIFICATE_PASSWORD"
          [ -z "${KEYCHAIN_PASSWORD:-}" ] && missing="${missing} KEYCHAIN_PASSWORD"
          if [ -n "$missing" ]; then
            echo "::error::Release signing secrets missing or empty:$missing. Add them under Settings → Secrets and variables → Actions (repository secrets). See RELEASING.md."
            exit 1
          fi
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm -f certificate.p12
          security find-identity -v -p codesigning build.keychain
          CERT_LINES=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID Application:" || true)
          if [ -z "$CERT_LINES" ]; then
            echo "::error::No Developer ID Application identity in keychain after import."
            exit 1
          fi
          COUNT=$(echo "$CERT_LINES" | wc -l | tr -d ' ')
          if [ "$COUNT" != "1" ]; then
            echo "::error::Expected exactly one Developer ID Application identity, found $COUNT:"
            echo "$CERT_LINES"
            exit 1
          fi
          CERT_ID=$(echo "$CERT_LINES" | awk -F'"' '{print $2}')
          echo "APPLE_SIGNING_IDENTITY=$CERT_ID" >> "$GITHUB_ENV"

      - name: Prepare App Store Connect API key for notarization
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
          APPLE_API_PRIVATE_KEY_BASE64: ${{ secrets.APPLE_API_PRIVATE_KEY_BASE64 }}
        run: |
          set -euo pipefail
          if [ -z "${APPLE_API_KEY:-}" ]; then
            echo "::error::Missing APPLE_API_KEY repository secret (App Store Connect Key ID). See RELEASING.md."
            exit 1
          fi
          KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY}.p8"
          if [ -n "${APPLE_API_PRIVATE_KEY:-}" ]; then
            printf '%s\n' "$APPLE_API_PRIVATE_KEY" > "$KEY_PATH"
          elif [ -n "${APPLE_API_PRIVATE_KEY_BASE64:-}" ]; then
            echo "$APPLE_API_PRIVATE_KEY_BASE64" | base64 --decode > "$KEY_PATH"
          else
            echo "::error::Missing APPLE_API_PRIVATE_KEY or APPLE_API_PRIVATE_KEY_BASE64 (.p8 key). See RELEASING.md."
            exit 1
          fi
          echo "APPLE_API_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Build DMG
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          # APPLE_SIGNING_IDENTITY and APPLE_API_KEY_PATH come from GITHUB_ENV (prior steps).
          # Sentry DSNs at compile time (optional; still gated by user Settings in-app).
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          # Web bundle source maps → Sentry (same release as import.meta.env.VITE_APP_VERSION / package.json).
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: keynobi
          SENTRY_PROJECT: javascript-solid
        run: |
          set -euo pipefail
          if [ -z "${APPLE_API_ISSUER:-}" ]; then
            echo "::error::Missing APPLE_API_ISSUER repository secret (App Store Connect Issuer ID). See RELEASING.md."
            exit 1
          fi
          npm run tauri build -- --target ${{ matrix.target }} --bundles dmg -f telemetry

      - name: Locate and rename DMG
        id: dmg
        run: |
          VERSION=${{ needs.check.outputs.version }}
          DMG=$(find "src-tauri/target/${{ matrix.target }}/release/bundle/dmg" -name "*.dmg" | head -1)
          if [ -z "$DMG" ]; then
            echo "ERROR: No DMG found after build" >&2
            exit 1
          fi
          DEST="Keynobi_${VERSION}_${{ matrix.arch }}.dmg"
          mv "$DMG" "$DEST"
          echo "path=$DEST" >> "$GITHUB_OUTPUT"
          echo "Built: $DEST"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v7
        with:
          name: dmg-${{ matrix.arch }}
          path: ${{ steps.dmg.outputs.path }}
          retention-days: 1

  # ── Job 3: Create git tag and GitHub Release ────────────────────────────────
  publish:
    name: Publish release
    needs: [check, build]
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download Apple Silicon DMG
        uses: actions/download-artifact@v8
        with:
          name: dmg-arm64

      - name: Download Intel DMG
        uses: actions/download-artifact@v8
        with:
          name: dmg-intel

      - name: Create and push tag
        run: |
          VERSION=${{ needs.check.outputs.version }}
          git tag "v${VERSION}"
          git push origin "v${VERSION}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ needs.check.outputs.version }}
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --generate-notes \
            "Keynobi_${VERSION}_arm64.dmg" \
            "Keynobi_${VERSION}_intel.dmg"
