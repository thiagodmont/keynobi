[package]
name = "android-ide"
version = "0.1.0"
description = "AI-First Android Development Environment"
authors = []
edition = "2021"

[lib]
name = "android_ide_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-opener = "2"
tauri-plugin-dialog = "2"
tauri-plugin-fs = "2"
tauri-plugin-shell = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
# notify v6 + debouncer-mini v0.4 are compatible
notify = { version = "6", features = ["macos_fsevent"] }
notify-debouncer-mini = "0.4"
walkdir = "2"
ignore = "0.4"
trash = "5"
tempfile = "3"
thiserror = "2"
log = "0.4"
